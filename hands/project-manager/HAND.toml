# HAND.toml - Project Manager
# Hand especializado em gestão de projetos ativos
# Corrigido em 2026-03-17: Removidas tools fictícias, adicionado [hand.agent], [hand.schedule], [hand.settings]

[hand]
id = "project-manager"
name = "Project Manager"
description = "Gerencia projetos ativos com outcomes claros, progresso visível e próxima ação definida. Usa LLM para análise e shell_exec para operações de YAML."
category = "productivity"
icon = "bar_chart"
version = "1.1.0"

[[hand.requires]]
tools = [
    "file_read",
    "file_write",
    "file_move",
    "file_list",
    "shell_exec",
    "memory_store",
    "memory_recall",
    "hand_message",
    "hand_spawn",
    "telegram_send"
]
capabilities = ["network", "memory_read", "memory_write"]
min_openfang_version = "1.0.0"

# Notas:
# - progress_calculator, stale_detector, yaml_frontmatter_extract, yaml_frontmatter_update
#   foram removidas (não existem no OpenFang)
# - Cálculo de progresso e YAML parsing feito via shell_exec + scripts/vault_ops.py
# - Detecção de projetos stale feita via raciocínio do LLM sobre datas no frontmatter

[hand.settings]
vault_path = { type = "string", default = "/data/obsidian_vault" }
projects_path = { type = "string", default = "/data/obsidian_vault/02-Projects" }
archive_path = { type = "string", default = "/data/obsidian_vault/05-Archive" }
stale_days_threshold = { type = "integer", default = 7, min = 1, max = 30 }
areas = { type = "array", default = ["wappv", "voltz", "dek", "pessoal", "dev", "learning"] }
scripts_path = { type = "string", default = "/data/openfang/scripts" }

[hand.agent]
model = "gemini/gemini-2.5-flash"
temperature = 0.2
max_iterations = 25

[[hand.agent.fallback]]
model = "groq/llama-3.3-70b-versatile"

[hand.schedule]
cron = "0 9 * * 1"    # Weekly review toda segunda às 09:00
on_event = ["hand_invoke"]

[metadata]
created = "2026-03-17"
updated = "2026-03-17"
author = "Matheus Gama de Luna"
tags = ["projects", "management", "gtd", "productivity", "portuguese"]