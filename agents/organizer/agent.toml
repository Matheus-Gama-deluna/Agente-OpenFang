# Required fields
name = "organizer"
version = "1.0.0"
description = "Responsável por interagir com TickTick e Obsidian, operando como cérebro de tarefas e conhecimento."
author = "Matheus Gama de Luna"
module = "builtin:chat"

# Optional metadata
tags = ["organizer", "ticktick", "obsidian", "gtd", "knowledge"]

# Model configuration (required)
[model]
provider = "gemini"
model = "gemini-2.5-flash"
api_key_env = "GEMINI_API_KEY"
max_tokens = 4096
temperature = 0.2
system_prompt = "file://SOUL.md"

# Optional fallback model (used when primary is unavailable)
[[fallback_models]]
provider = "groq"
model = "llama-3.3-70b-versatile"
api_key_env = "GROQ_API_KEY"

# Optional schedule (for autonomous/background agents)
[schedule]
periodic = { cron = "every 30m" }

# Resource limits
[resources]
max_llm_tokens_per_hour = 150000
max_concurrent_tools = 5

# Capability grants (principle of least privilege)
[capabilities]
tools = ["file_read", "file_write", "file_list", "shell_exec", "memory_store", "memory_recall", "agent_send"]
network = []
memory_read = ["*"]
memory_write = ["self.*", "shared.context.*", "shared.obsidian.*", "shared.ticktick.*"]
agent_spawn = false
agent_message = ["*"]
shell = ["python tools/ticktick_bridge.py *"]
