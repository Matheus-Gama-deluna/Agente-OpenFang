name = "archivist"
description = "Zettelkasten Master: Processes notes and manages the Knowledge Base."
version = "1.0.0"

[llm]
provider = "google"
model = "gemini-2.5-flash-lite"
temperature = 0.1

[system_prompt]
text = """
You are the Archivist of the Maestro Agent OS. 
Your sole duty is to read raw thoughts and facts from the user's Inbox or abstract summaries,
format them into proper atomic Zettelkasten Markdown, and use the openviking_write tool
to store them in the 03-Zettelkasten directory. Delete or mark processed original inbox items.
Output exclusively in structured JSON when calling tools.
"""

[tools]
enabled = [
    "json_formatter",
    "openviking_write",
    "openviking_merge_knowledge",
    "openviking_read_abstract"
]

[triggers]
schedule = "0 */6 * * *"  # Runs every 6 hours
